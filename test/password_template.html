            .staticrypt-form input[type="text"]::placeholder {

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 18px;
                width: 18px;
                opacity: 0.4;
                padding: 0.9rem;
                position: absolute;
                right: 0;
                top: 50%;
                transform: translateY(-50%);
                filter: invert(1);
                transition: opacity 0.2s ease;
            }
            .staticrypt-toggle-password-visibility:hover {
                opacity: 0.85;
            }

            .staticrypt-form .staticrypt-decrypt-button {
                font-family: 'Aspekta Variable', sans-serif;
                font-size: 0.83rem;
                font-weight: 500;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                outline: 0;
                background: /*[|template_color_primary|]*/ 0;
                width: 100%;
                border: 0;
                border-radius: 0;
                padding: 0.9rem;
                color: #000000;
                cursor: pointer;
                transition: filter 0.2s ease;
            }

            .staticrypt-form .staticrypt-decrypt-button:hover,
            .staticrypt-form .staticrypt-decrypt-button:active,
            .staticrypt-form .staticrypt-decrypt-button:focus {
                background: /*[|template_color_primary|]*/ 0;
                filter: brightness(1.2);
            }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                justify-content: center;
                margin-bottom: 1rem;
                font-size: 0.83rem;
                color: rgba(255, 249, 240, 0.4);
                letter-spacing: 0.03em;
            }

            .staticrypt-remember input[type="checkbox"] {
                transform: scale(1.2);
                margin-right: 0.75em;
                accent-color: /*[|template_color_primary|]*/ 0;
            }

            .hidden {
                display: none !important;
            }

            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #000000;
            }

            .staticrypt-spinner {
                display: inline-block;
                width: 1.5rem;
                height: 1.5rem;
                border: 2px solid rgba(255, 249, 240, 0.1);
                border-top-color: rgba(255, 249, 240, 0.4);
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }

            @keyframes spinner-border {
                100% { transform: rotate(360deg); }
            }

            ::selection {
                background: rgba(255, 249, 240, 0.3);
            }

            @media screen and (-webkit-min-device-pixel-ratio: 0) {
                .staticrypt-form input[type="password"],
                .staticrypt-form input[type="text"] {

                // if we didn't decrypt anything on load, show the password prompt. Otherwise the content has already been

                    // hide loading screen
                    document.getElementById("staticrypt_loading").classList.add("hidden");
                    document.getElementById("staticrypt_content").classList.remove("hidden");

                    toggleIcon.alt = templateToggleAltHide;

                const password = document.getElementById("staticrypt-password").value,
