<!DOCTYPE html>
<html class="staticrypt-html">
    <head>
        <meta charset="utf-8" />
        <title>Presentation</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- do not cache this page -->
        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />

        <style>
            @font-face {
                font-family: 'Aspekta Variable';
                src: url('fonts/AspektaVF.woff2') format('woff2');
                font-weight: 100 900;
                font-display: swap;
            }

            .staticrypt-html {
                height: 100%;
            }

            .staticrypt-body {
                height: 100%;
                margin: 0;
            }

            .staticrypt-content {
                height: 100%;
                background: #000000;
                font-family: 'Aspekta Variable', sans-serif;
                color: rgba(255, 249, 240, 0.85);
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .staticrypt-page {
                width: 100%;
                max-width: 360px;
                padding: 2rem;
                box-sizing: border-box;
            }

            .staticrypt-form {
                text-align: center;
            }

            .staticrypt-title {
                font-size: 1.5rem;
                font-weight: 700;
                letter-spacing: 0.03em;
                margin-bottom: 0.75rem;
            }

            .staticrypt-instructions {
                margin-bottom: 2rem;
            }

            .staticrypt-instructions p {
                margin: 0;
                line-height: 1.6;
            }

            .staticrypt-instructions p:last-child {
                font-size: 0.83rem;
                color: rgba(255, 249, 240, 0.4);
                letter-spacing: 0.03em;
            }

            .staticrypt-hr {
                border: 0;
                border-top: 1px solid rgba(255, 249, 240, 0.1);
                margin: 1.5rem 0;
            }

            .staticrypt-password-container {
                position: relative;
                background: rgba(255, 249, 240, 0.08);
                border: 1px solid rgba(255, 249, 240, 0.1);
                border-radius: 0;
                width: 100%;
                margin: 0 0 1rem;
                box-sizing: border-box;
            }

            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                background: transparent;
                border: 0;
                box-sizing: border-box;
                font-family: 'Aspekta Variable', sans-serif;
                font-size: 0.83rem;
                letter-spacing: 0.03em;
                color: rgba(255, 249, 240, 0.85);
                outline: 0;
                padding: 0.9rem 2.5rem 0.9rem 1rem;
                width: 100%;
            }

            .staticrypt-form input[type="password"]::placeholder,
            .staticrypt-form input[type="text"]::placeholder {
                color: rgba(255, 249, 240, 0.25);
            }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 18px;
                width: 18px;
                opacity: 0.4;
                padding: 0.9rem;
                position: absolute;
                right: 0;
                top: 50%;
                transform: translateY(-50%);
                filter: invert(1);
                transition: opacity 0.2s ease;
            }
            .staticrypt-toggle-password-visibility:hover {
                opacity: 0.85;
            }

            .staticrypt-form .staticrypt-decrypt-button {
                font-family: 'Aspekta Variable', sans-serif;
                font-size: 0.83rem;
                font-weight: 500;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                outline: 0;
                background: rgb(0, 120, 212);
                width: 100%;
                border: 0;
                border-radius: 0;
                padding: 0.9rem;
                color: #000000;
                cursor: pointer;
                transition: filter 0.2s ease;
            }

            .staticrypt-form .staticrypt-decrypt-button:hover,
            .staticrypt-form .staticrypt-decrypt-button:active,
            .staticrypt-form .staticrypt-decrypt-button:focus {
                background: rgb(0, 120, 212);
                filter: brightness(1.2);
            }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                justify-content: center;
                margin-bottom: 1rem;
                font-size: 0.83rem;
                color: rgba(255, 249, 240, 0.4);
                letter-spacing: 0.03em;
            }

            .staticrypt-remember input[type="checkbox"] {
                transform: scale(1.2);
                margin-right: 0.75em;
                accent-color: rgb(0, 120, 212);
            }

            .hidden {
                display: none !important;
            }

            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #000000;
            }

            .staticrypt-spinner {
                display: inline-block;
                width: 1.5rem;
                height: 1.5rem;
                border: 2px solid rgba(255, 249, 240, 0.1);
                border-top-color: rgba(255, 249, 240, 0.4);
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }

            @keyframes spinner-border {
                100% { transform: rotate(360deg); }
            }

            ::selection {
                background: rgba(255, 249, 240, 0.3);
            }

            @media screen and (-webkit-min-device-pixel-ratio: 0) {
                .staticrypt-form input[type="password"],
                .staticrypt-form input[type="text"] {
                    font-size: 16px;
                }
            }
        </style>
    </head>

    <body class="staticrypt-body">
        <div id="staticrypt_loading" class="staticrypt-spinner-container">
            <div class="staticrypt-spinner"></div>
        </div>

                            Remember me

                        <input type="submit" class="staticrypt-decrypt-button" value="DECRYPT" />
                    </form>
                </div>
            </div>
        </div>
