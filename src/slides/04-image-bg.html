    <!-- SLIDE 4 — Image background (photo) -->
    <section class="slide">
      <!--
        Image background: use .slide-bg--cover for photos.
        Fills the viewport and crops edges rather than letterboxing.
        Works with any image format — JPG, PNG, WebP, AVIF.
      -->
      <img class="slide-bg slide-bg--cover" src="https://picsum.photos/seed/photo-bg/1920/1080" alt="" style="opacity:30%;">

      <div class="slide-content" style="text-align:center;">
        <div class="slide-label">Image Background</div>
        <h2 class="slide-title" style="font-size:clamp(2rem,4vw,3.5rem);">
          Full-Bleed Photo
        </h2>
        <p class="slide-body" style="margin:0 auto;">
          Add slide-bg--cover for photos that should fill the viewport.
          Default slide-bg uses contain — better for designed SVGs.
        </p>
      </div>
    </section>
