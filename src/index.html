<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide Deck</title>

  <!-- Video.js + sprite thumbnails plugin -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/video.js/8.10.0/video-js.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/video.js/8.10.0/video.min.js"></script>
  <script src="https://unpkg.com/videojs-sprite-thumbnails/dist/videojs-sprite-thumbnails.min.js"></script>

  <!-- Slideshow styles -->
  <link href="styles.css" rel="stylesheet">
</head>
<body>

  <!-- ==========================================
       SLIDE DECK
       ========================================== -->
  <div class="deck" id="deck">

    <include src="slides/01-title.html"></include>
    <include src="slides/02-video-demo.html"></include>
    <include src="slides/03-svg-backdrop.html"></include>
    <include src="slides/04-image-bg.html"></include>
    <include src="slides/05-inline-svg-video.html"></include>
    <include src="slides/06-video-gallery.html"></include>
    <include src="slides/07-closing.html"></include>

  </div>

  <!-- DECK CHROME — fixed UI -->
  <div class="deck-chrome deck-title">Presentation Title</div>
  <a class="deck-chrome deck-logo" href="https://chrisbialkow.ski/" target="_blank" rel="noopener"><img src="images/logo.svg" alt=""></a>
  <div class="deck-chrome deck-counter" id="counter"></div>

  <!-- SLIDE INDICATOR DOTS -->
  <nav class="slide-indicator" id="indicator" aria-label="Slide navigation"></nav>

  <!-- NAV HINT -->
  <div class="nav-hint" id="navHint">
    <kbd>↑</kbd> <kbd>↓</kbd> <span style="margin-left:0.5em;">or scroll to navigate</span>
  </div>

  <!-- NAV ARROWS (appear after hint dismisses) -->
  <button class="nav-arrow nav-arrow--up is-hidden" id="navUp" aria-label="Previous slide">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18,15 12,9 6,15"/></svg>
  </button>
  <button class="nav-arrow nav-arrow--down is-hidden" id="navDown" aria-label="Next slide">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6,9 12,15 18,9"/></svg>
  </button>

  <script>
    // ==========================================
    // SLIDESHOW ENGINE
    // ==========================================

    const deck = document.getElementById('deck');
    const slides = deck.querySelectorAll('.slide');
    const indicator = document.getElementById('indicator');
    const navHint = document.getElementById('navHint');
    const navUp = document.getElementById('navUp');
    const navDown = document.getElementById('navDown');
    const counter = document.getElementById('counter');
    let currentSlide = 0;

    // --- Auto-index slides ---
    slides.forEach((s, i) => s.dataset.slide = i);

    // --- Nav arrow clicks ---
    navUp.addEventListener('click', () => goToSlide(currentSlide - 1));
    navDown.addEventListener('click', () => goToSlide(currentSlide + 1));

    // --- Build indicator dots ---
    slides.forEach((_, i) => {
      const dot = document.createElement('button');
      dot.className = 'slide-indicator__dot' + (i === 0 ? ' is-active' : '');
      dot.setAttribute('aria-label', `Go to slide ${i + 1}`);
      dot.addEventListener('click', () => goToSlide(i));
      indicator.appendChild(dot);
    });

    // --- Navigate to slide ---
    function goToSlide(index) {
      if (index < 0 || index >= slides.length) return;
      slides[index].scrollIntoView({ behavior: 'smooth' });
    }

    // --- Track current slide via IntersectionObserver ---
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const index = parseInt(entry.target.dataset.slide);
          currentSlide = index;
          updateIndicator(index);
          manageVideos(index);
        }
      });
    }, {
      root: deck,
      threshold: 0.6
    });

    slides.forEach(slide => observer.observe(slide));
    counter.textContent = `1 / ${slides.length}`;

    function updateIndicator(activeIndex) {
      indicator.querySelectorAll('.slide-indicator__dot').forEach((dot, i) => {
        dot.classList.toggle('is-active', i === activeIndex);
      });
      counter.textContent = `${activeIndex + 1} / ${slides.length}`;
      // hide arrows at first/last slide
      navUp.classList.toggle('is-hidden-arrow', activeIndex === 0);
      navDown.classList.toggle('is-hidden-arrow', activeIndex === slides.length - 1);
    }

    // --- Show nav arrows + hide hint ---
    function showNavArrows() {
      if (hasNavigated) return;
      hasNavigated = true;
      navHint.classList.add('is-hidden');
      navUp.classList.remove('is-hidden');
      navDown.classList.remove('is-hidden');
      updateIndicator(currentSlide);
    }

    // --- Keyboard navigation ---
    let hasNavigated = false;
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowDown' || e.key === 'PageDown' || e.key === ' ') {
        e.preventDefault();
        goToSlide(currentSlide + 1);
      } else if (e.key === 'ArrowUp' || e.key === 'PageUp') {
        e.preventDefault();
        goToSlide(currentSlide - 1);
      }

      showNavArrows();
    });

    deck.addEventListener('scroll', () => {
      showNavArrows();
    }, { once: true });

    // ==========================================
    // VIDEO MANAGEMENT
    // ==========================================

    // Pause videos on non-visible slides
    function manageVideos(activeIndex) {
      slides.forEach((slide, i) => {
        if (i === activeIndex) return;
        slide.querySelectorAll('.video-js').forEach(el => {
          const player = videojs.getPlayer(el.id);
          if (player) player.pause();
        });
      });
    }

    // Pause all other players when one starts playing
    function pauseOtherPlayers(currentPlayer) {
      if (typeof videojs === 'undefined') return;
      videojs.getAllPlayers().forEach(player => {
        if (player !== currentPlayer && !player.paused()) {
          player.pause();
        }
      });
    }

    // ==========================================
    // VIDEO PLAYER INITIALIZATION
    // Handles custom posters, sprite thumbnails,
    // and HLS quality selector for all players.
    // ==========================================

    function initPlayers() {
      if (typeof videojs === 'undefined') return;

      document.querySelectorAll('.video-mount video').forEach(videoEl => {
        if (videoEl.classList.contains('vjs-tech')) return;

        const mount = videoEl.closest('.video-mount');

        const player = videojs(videoEl, {
          fluid: true,
          preload: 'auto',
          html5: {
            vhs: { overrideNative: true }
          }
        });

        // --- Custom poster ---
        const poster = mount?.querySelector('.video-poster');
        if (poster) {
          player.on('play', () => {
            poster.classList.add('hidden');
            pauseOtherPlayers(player);
          });
          poster.addEventListener('click', () => player.play());
        } else {
          player.on('play', () => pauseOtherPlayers(player));
        }

        // --- Sprite thumbnails ---
        const spriteUrl  = mount?.dataset.thumbSprite;
        const configUrl  = mount?.dataset.thumbConfig;
        if (spriteUrl) {
          const apply = (config) => {
            player.spriteThumbnails({
              url:      spriteUrl,
              width:    config?.width    || 160,
              height:   config?.height   || 90,
              columns:  config?.columns  || 10,
              rows:     config?.rows     || 17,
              interval: config?.interval || 1
            });
          };
          if (configUrl) {
            fetch(configUrl)
              .then(res => res.ok ? res.json() : null)
              .then(apply)
              .catch(() => apply(null));
          } else {
            apply(null);
          }
        }

        // --- HLS quality selector ---
        player.ready(() => addQualitySelector(player));
      });
    }

    // ==========================================
    // HLS QUALITY SELECTOR
    // Adds Auto / 1080p / 720p / etc. menu
    // to the control bar for HLS streams.
    // ==========================================

    function addQualitySelector(player) {
      let currentQuality = 'auto';
      let qualityButton = null;

      player.on('loadedmetadata', () => {
        if (qualityButton) return;

        const vhs = player.tech(true)?.vhs;
        if (!vhs) return;

        const representations = vhs.representations();
        if (!representations || representations.length <= 1) return;

        const heights = [...new Set(representations.map(r => r.height))].sort((a, b) => b - a);
        if (heights.length <= 1) return;

        function applyQuality(selectedHeight, forceSwitch = false) {
          const currentVhs = player.tech(true)?.vhs;
          if (!currentVhs) return;

          if (!currentVhs._originalSelectPlaylist) {
            currentVhs._originalSelectPlaylist = currentVhs.selectPlaylist.bind(currentVhs);
          }

          if (selectedHeight) {
            currentVhs.selectPlaylist = () => {
              const playlists = currentVhs.playlists?.main?.playlists || [];
              return playlists.find(p => p.attributes?.RESOLUTION?.height === selectedHeight)
                || currentVhs._originalSelectPlaylist();
            };
            currentVhs.representations().forEach(rep => rep.enabled(rep.height === selectedHeight));

            if (forceSwitch) {
              const playlists = currentVhs.playlists?.main?.playlists || [];
              const target = playlists.find(p => p.attributes?.RESOLUTION?.height === selectedHeight);
              if (target) currentVhs.playlists.media(target);
            }
          } else {
            if (currentVhs._originalSelectPlaylist) {
              currentVhs.selectPlaylist = currentVhs._originalSelectPlaylist;
            }
            currentVhs.representations().forEach(rep => rep.enabled(true));
          }
        }

        const MenuButton = videojs.getComponent('MenuButton');
        const MenuItem = videojs.getComponent('MenuItem');

        class QualityMenuItem extends MenuItem {
          constructor(p, options) {
            super(p, { label: options.label, selectable: true });
            this.qualityHeight = options.height;
          }

          handleClick() {
            const selectedHeight = this.qualityHeight;
            const currentTime = player.currentTime();
            const wasPlaying = !player.paused();
            const src = player.currentSrc();

            currentQuality = selectedHeight || 'auto';
            player.src({ src, type: 'application/x-mpegURL' });

            player.one('loadedmetadata', () => {
              applyQuality(selectedHeight, true);
              player.currentTime(currentTime);
              if (wasPlaying) player.play();
              updateMenuSelection();
            });
          }
        }

        function updateMenuSelection() {
          if (!qualityButton?.items) return;
          qualityButton.items.forEach(item => {
            const isSelected = (item.qualityHeight || 'auto') === currentQuality
              || (item.qualityHeight === null && currentQuality === 'auto');
            item.selected(isSelected);
            item[isSelected ? 'addClass' : 'removeClass']('vjs-selected');
          });
        }

        class QualityMenuButton extends MenuButton {
          constructor(p, options) {
            super(p, options);
            this.addClass('vjs-quality-selector');
            this.controlText('Quality');
          }
          createItems() {
            const items = [new QualityMenuItem(this.player_, { label: 'Auto', height: null })];
            items[0].addClass('vjs-selected');
            heights.forEach(h => items.push(new QualityMenuItem(this.player_, { label: h + 'p', height: h })));
            return items;
          }
          buildCSSClass() {
            return `vjs-quality-selector ${super.buildCSSClass()}`;
          }
        }

        const controlBar = player.getChild('controlBar');
        if (controlBar) {
          const fsToggle = controlBar.getChild('fullscreenToggle');
          const idx = controlBar.children().indexOf(fsToggle);
          qualityButton = new QualityMenuButton(player, {});
          controlBar.addChild(qualityButton, {}, idx);
        }
      });
    }

    // ==========================================
    // SVG PLACEHOLDER → VIDEO POSITIONING
    // with ResizeObserver for responsive updates
    // ==========================================

    /**
     * Mounts a video.js player over an SVG element.
     * Automatically repositions on resize.
     *
     * @param {string} svgContainerId  - ID of the .slide-bg-inline wrapper
     * @param {string} placeholderName - ID of the rect/element inside the SVG
     * @param {string} videoSrc        - Streaming URL or mp4 path
     * @param {string} videoType       - MIME type (e.g. 'application/x-mpegURL')
     */
    function mountVideoOnSVG(svgContainerId, placeholderName, videoSrc, videoType = 'video/mp4') {
      const container = document.getElementById(svgContainerId);
      if (!container) return;

      const svg = container.querySelector('svg');
      const placeholder = svg?.getElementById(placeholderName);
      if (!placeholder) {
        console.warn(`SVG placeholder "${placeholderName}" not found in #${svgContainerId}`);
        return;
      }

      const slide = container.closest('.slide');

      const mount = document.createElement('div');
      mount.className = 'video-mount video-mount--positioned';
      slide.appendChild(mount);

      const videoId = `svg-player-${placeholderName}`;
      mount.innerHTML = `
        <video id="${videoId}" class="video-js" controls preload="auto">
          <source src="${videoSrc}" type="${videoType}">
        </video>`;

      placeholder.style.opacity = '0';

      function reposition() {
        const slideRect = slide.getBoundingClientRect();
        const phRect = placeholder.getBoundingClientRect();
        mount.style.left   = (phRect.left - slideRect.left) + 'px';
        mount.style.top    = (phRect.top - slideRect.top) + 'px';
        mount.style.width  = phRect.width + 'px';
        mount.style.height = phRect.height + 'px';
      }

      reposition();
      new ResizeObserver(reposition).observe(container);
      videojs(videoId, { fluid: false });
    }

    // ==========================================
    // VIDEO GALLERY
    // Thumbnail strip switches the main player.
    // ==========================================

    function initGalleries() {
      document.querySelectorAll('.video-gallery').forEach(gallery => {
        const playerEl = gallery.querySelector('.video-mount video');
        if (!playerEl) return;

        const player = videojs.getPlayer(playerEl.id);
        if (!player) return;

        const poster = gallery.querySelector('.video-poster');
        const thumbs = gallery.querySelectorAll('.video-gallery-thumb');

        thumbs.forEach(thumb => {
          thumb.addEventListener('click', () => {
            const videoUrl = thumb.dataset.videoUrl;
            const posterUrl = thumb.dataset.poster;
            const videoType = videoUrl.endsWith('.m3u8') ? 'application/x-mpegURL' : 'video/mp4';

            player.src({ src: videoUrl, type: videoType });

            if (poster) {
              poster.style.backgroundImage = `url('${posterUrl}')`;
              poster.classList.remove('hidden');
            }

            // Don't autoplay — let poster show, user clicks play
            thumbs.forEach(t => t.classList.remove('active'));
            thumb.classList.add('active');
          });
        });
      });
    }

    // ==========================================
    // INIT
    // ==========================================
    initPlayers();
    initGalleries();

    // ==========================================
    // EXAMPLE: Mount a video on an SVG rect
    //
    // mountVideoOnSVG(
    //   'slide5-svg',
    //   'video-zone',
    //   'https://your-stream.com/manifest.m3u8',
    //   'application/x-mpegURL'
    // );
    // ==========================================
  </script>

</body>
</html>
